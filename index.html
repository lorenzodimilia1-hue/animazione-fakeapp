  <style>
        * {
            font-family: 'Source Sans 3', sans-serif;
        }
        
        .eu-gradient {
            background: linear-gradient(135deg, #003399 0%, #001a4d 50%, #000d26 100%);
        }
        
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 51, 153, 0.4);
        }
        
        .card-hover:active {
            transform: translateY(-2px) scale(0.98);
        }
        
        .star {
            animation: twinkle 2s ease-in-out infinite;
        }
        
        .star:nth-child(2) { animation-delay: 0.17s; }
        .star:nth-child(3) { animation-delay: 0.33s; }
        .star:nth-child(4) { animation-delay: 0.5s; }
        .star:nth-child(5) { animation-delay: 0.67s; }
        .star:nth-child(6) { animation-delay: 0.83s; }
        .star:nth-child(7) { animation-delay: 1s; }
        .star:nth-child(8) { animation-delay: 1.17s; }
        .star:nth-child(9) { animation-delay: 1.33s; }
        .star:nth-child(10) { animation-delay: 1.5s; }
        .star:nth-child(11) { animation-delay: 1.67s; }
        .star:nth-child(12) { animation-delay: 1.83s; }
        
        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        
        .fade-in-delay {
            animation: fadeIn 0.8s ease-out 0.3s forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        .gold-border {
            border: 2px solid transparent;
            background: linear-gradient(#ffffff, #ffffff) padding-box,
                        linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%) border-box;
        }
        
        .icon-container {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 165, 0, 0.05) 100%);
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 40;
            animation: overlayFadeIn 1.2s ease-out;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        @keyframes overlayFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .modal-card {
            background: white;
            border-radius: 2rem;
            padding: 3rem;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: cardOpen 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 2px solid transparent;
            background: linear-gradient(#ffffff, #ffffff) padding-box,
                        linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%) border-box;
        }
        
        @keyframes cardOpen {
            from {
                opacity: 0;
                transform: scale(0.7) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1.5rem;
        }
        
        .modal-icon {
            width: 4rem;
            height: 4rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-center;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 165, 0, 0.08) 100%);
        }
        
        .close-button {
            position: absolute;
            top: 2rem;
            right: 2rem;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .close-button:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: rotate(90deg);
        }
    </style>

  <script>
        // Default configuration
        const defaultConfig = {
            main_title: 'Fondi Europei',
            subtitle: 'Seleziona il programma di finanziamento',
            card1_title: 'PNRR',
            card1_description: 'Piano Nazionale di Ripresa e Resilienza',
            card2_title: 'FESR',
            card2_description: 'Fondo Europeo di Sviluppo Regionale',
            primary_color: '#003399',
            secondary_color: '#FFD700',
            text_color: '#1e3a5f',
            card_bg_color: '#ffffff',
            accent_color: '#1d4ed8'
        };
        
        // Open modal with animation
        function openModal(cardType) {
            const overlay = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const subtitle = document.getElementById('modalSubtitle');
            const icon = document.getElementById('modalIcon');
            
            if (cardType === 'PNRR') {
                title.textContent = defaultConfig.card1_title;
                subtitle.textContent = defaultConfig.card1_description;
                icon.innerHTML = '<svg class="w-8 h-8 text-blue-900" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>';
            } else if (cardType === 'FESR') {
                title.textContent = defaultConfig.card2_title;
                subtitle.textContent = defaultConfig.card2_description;
                icon.innerHTML = '<svg class="w-8 h-8 text-blue-900" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
            }
            
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        // Close modal
        function closeModal(event) {
            const overlay = document.getElementById('modalOverlay');
            if (event && event.target !== overlay) return;
            
            overlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
        
        // Initialize Element SDK
        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                onConfigChange: async (config) => {
                    // Update text content
                    document.getElementById('main-title').textContent = config.main_title || defaultConfig.main_title;
                    document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
                    document.getElementById('card1-title').textContent = config.card1_title || defaultConfig.card1_title;
                    document.getElementById('card1-description').textContent = config.card1_description || defaultConfig.card1_description;
                    document.getElementById('card2-title').textContent = config.card2_title || defaultConfig.card2_title;
                    document.getElementById('card2-description').textContent = config.card2_description || defaultConfig.card2_description;
                },
                mapToCapabilities: (config) => ({
                    recolorables: [
                        {
                            get: () => config.primary_color || defaultConfig.primary_color,
                            set: (value) => { config.primary_color = value; window.elementSdk.setConfig({ primary_color: value }); }
                        },
                        {
                            get: () => config.secondary_color || defaultConfig.secondary_color,
                            set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); }
                        },
                        {
                            get: () => config.text_color || defaultConfig.text_color,
                            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
                        },
                        {
                            get: () => config.card_bg_color || defaultConfig.card_bg_color,
                            set: (value) => { config.card_bg_color = value; window.elementSdk.setConfig({ card_bg_color: value }); }
                        },
                        {
                            get: () => config.accent_color || defaultConfig.accent_color,
                            set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
                        }
                    ],
                    borderables: [],
                    fontEditable: {
                        get: () => config.font_family || defaultConfig.font_family,
                        set: (value) => { config.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
                    },
                    fontSizeable: undefined
                }),
                mapToEditPanelValues: (config) => new Map([
                    ['main_title', config.main_title || defaultConfig.main_title],
                    ['subtitle', config.subtitle || defaultConfig.subtitle],
                    ['card1_title', config.card1_title || defaultConfig.card1_title],
                    ['card1_description', config.card1_description || defaultConfig.card1_description],
                    ['card2_title', config.card2_title || defaultConfig.card2_title],
                    ['card2_description', config.card2_description || defaultConfig.card2_description]
                ])
            });
        }
    </script>
